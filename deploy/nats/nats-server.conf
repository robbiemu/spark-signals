listen: 127.0.0.1:4222

authorization {
  users: [
    {
      user: spark-agent
      password: $SPARK_AGENT_PASSWORD
      permissions: {
        publish: $SPARK_AGENT_PUBLISH_SUBJECT
        subscribe: []
      }
    }
    {
      user: spark-bridge
      password: $SPARK_BRIDGE_PASSWORD
      permissions: {
        publish: []
        subscribe: "spark.v1.>"
      }
    }
  ]
}

# Core NATS is intentionally used for periodic state. Critical health events are
# not durable until selective JetStream retention is configured and tested.
